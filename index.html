<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>豪豪的个人主页</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; line-height: 1.6; color: #333; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 600px; width: 100%; overflow: hidden; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 40px 30px; text-align: center; color: white; }
        .avatar { width: 120px; height: 120px; border-radius: 50%; border: 4px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.2); margin-bottom: 15px; background: #fff; display: inline-flex; align-items: center; justify-content: center; font-size: 48px; }
        .name { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .title { font-size: 16px; opacity: 0.9; }
        .content { padding: 30px; }
        .section { margin-bottom: 25px; }
        .section-title { font-size: 18px; font-weight: 600; color: #667eea; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .section-title::before { content: "▸"; color: #764ba2; }
        .intro { color: #666; line-height: 1.8; }
        .skills { display: flex; flex-wrap: wrap; gap: 10px; }
        .skill-tag { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 6px 16px; border-radius: 20px; font-size: 14px; }
        .links { display: flex; flex-direction: column; gap: 12px; }
        .link-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: #f8f9fa; border-radius: 10px; text-decoration: none; color: #333; transition: all 0.3s ease; }
        .link-item:hover { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; transform: translateX(5px); }
        .link-icon { font-size: 20px; }
        .footer { background: #f8f9fa; padding: 20px; text-align: center; color: #999; font-size: 14px; }
        .footer a { color: #667eea; text-decoration: none; }
        @media (max-width: 480px) { .name { font-size: 24px; } .content { padding: 20px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="avatar">👋</div>
            <div class="name">豪豪</div>
            <div class="title">欢迎来到我的个人主页</div>
        </div>
        <div class="content">
            <div class="section">
                <div class="section-title">关于我</div>
                <p class="intro">你好！我是豪豪，一个热爱技术和探索的人。期待与你相遇！</p>
            </div>
            <div class="section">
                <div class="section-title">技能标签</div>
                <div class="skills">
                    <span class="skill-tag">💻 编程</span>
                    <span class="skill-tag">🎨 设计</span>
                    <span class="skill-tag">📱 开发</span>
                    <span class="skill-tag">🤖 AI</span>
                </div>
            </div>
        </div>
        <div class="footer">made with ❤️ by 豪豪</div>
    </div>
</body>
</html>
