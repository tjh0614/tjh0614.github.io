<script>
let initFullSync;
(function() {
    const GITHUB_OWNER = "tjh0614";
    const GITHUB_REPO = "blog-uploads";
    const GITHUB_TOKEN = "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"; 

    const syncTip = document.getElementById("syncTip");
    const canvas = document.getElementById('starCanvas');
    const ctx = canvas.getContext('2d');
    let stars = [], meteors = [];
    let width, height;
    let targetOffsetX = 0, targetOffsetY = 0, currentOffsetX = 0, currentOffsetY = 0;
    const STAR_COUNT = 600, MAX_OFFSET = 18;
    const starColors = ['rgba(255,245,225,{alpha})','rgba(235,240,255,{alpha})','rgba(255,235,210,{alpha})','rgba(210,225,255,{alpha})'];

    class Star {
        constructor(x,y,radius,bright,speed,colorType){ this.x=x; this.y=y; this.radius=radius; this.baseBrightness=bright; this.twinkleSpeed=speed; this.phase=Math.random()*Math.PI*2; this.colorType=colorType; this.depthFactor=Math.min(1.0, radius/2.8); }
        getAlpha(now){ let twinkle=0.6+0.4*Math.sin(now*this.twinkleSpeed+this.phase); return Math.min(0.95, Math.max(0.15, this.baseBrightness*twinkle)); }
        getColor(alpha){ return starColors[this.colorType%starColors.length].replace('{alpha}',alpha); }
    }
    class Meteor {
        constructor(){ this.x=Math.random()*width; this.y=Math.random()*height*0.6; this.vx=(Math.random()*6+3)*(Math.random()>0.5?1:-1); this.vy=Math.random()*5+2; if(Math.abs(this.vx)<2) this.vx=this.vx>0?3:-3; this.life=1.0; this.decay=0.008+Math.random()*0.01; }
        update(){ this.x+=this.vx; this.y+=this.vy; this.life-=this.decay; return this.life>0 && this.x+40>0 && this.x-40<width && this.y<height+100; }
        draw(ctx,now){ let alpha=this.life*0.8; ctx.beginPath(); ctx.moveTo(this.x,this.y); ctx.lineTo(this.x-this.vx*1.2,this.y-this.vy*1.2); ctx.lineWidth=1.8; ctx.strokeStyle=`rgba(255,235,200,${alpha*0.9})`; ctx.stroke(); ctx.beginPath(); ctx.arc(this.x,this.y,2.2,0,Math.PI*2); ctx.fillStyle=`rgba(255,210,150,${alpha})`; ctx.fill(); for(let i=1;i<=3;i++){ let bx=this.x-this.vx*(i*1.5), by=this.y-this.vy*(i*1.5); ctx.beginPath(); ctx.arc(bx,by,1.5-i*0.3,0,Math.PI*2); ctx.fillStyle=`rgba(255,200,140,${alpha*(0.5-i*0.1)})`; ctx.fill(); } }
    }
    function generateStars(){
        stars=[]; for(let i=0;i<STAR_COUNT;i++){ let x,y; if(Math.random()<0.28){ let cx=Math.random()*0.8+0.1, cy=Math.random()*0.8+0.1; x=cx+(Math.random()-0.5)*0.08; y=cy+(Math.random()-0.5)*0.06; x=Math.min(0.98,Math.max(0.02,x)); y=Math.min(0.98,Math.max(0.02,y)); } else { x=Math.random(); y=Math.random(); }
            let r=0.7+Math.pow(Math.random(),1.5)*3.0; let bright=0.3+(r/4.0)*0.7; bright=Math.min(0.95,bright); let speed=0.002+Math.random()*0.012; let ct=Math.floor(Math.random()*starColors.length); stars.push(new Star(x,y,r,bright,speed,ct)); }
        for(let i=0;i<300;i++){ let x=Math.random(),y=Math.random(),r=0.4+Math.random()*0.6,b=0.2+Math.random()*0.4,s=0.001+Math.random()*0.008,ct=Math.floor(Math.random()*starColors.length); stars.push(new Star(x,y,r,b,s,ct)); }
    }
    let lastMeteor=0; function tryAddMeteor(now){ if(meteors.length>=2) return; let interval=38+Math.random()*45; if(now-lastMeteor>interval){ meteors.push(new Meteor()); lastMeteor=now; } }
    let mouseMove=false; window.addEventListener('mousemove',(e)=>{ mouseMove=true; let nx=(e.clientX/width)*2-1, ny=(e.clientY/height)*2-1; targetOffsetX=nx*MAX_OFFSET; targetOffsetY=ny*MAX_OFFSET; });
    setInterval(()=>{ if(!mouseMove){ targetOffsetX=0; targetOffsetY=0; } currentOffsetX+=(targetOffsetX-currentOffsetX)*0.08; currentOffsetY+=(targetOffsetY-currentOffsetY)*0.08; },30);
    function drawStars(nowMs){ 
        if(!ctx) return; 
        let nowSec=nowMs/1000; 
        ctx.clearRect(0,0,width,height); 
        ctx.fillStyle='#000'; 
        ctx.fillRect(0,0,width,height); 
        let offX=currentOffsetX, offY=currentOffsetY;
        for(let s of stars){ 
            let dx=s.x*width+offX*(s.depthFactor*0.7), dy=s.y*height+offY*(s.depthFactor*0.7); 
            if(dx<-20||dx>width+20||dy<-20||dy>height+20) continue; 
            let alpha=s.getAlpha(nowSec); 
            ctx.beginPath(); ctx.arc(dx,dy,s.radius,0,Math.PI*2); ctx.fillStyle=s.getColor(alpha); ctx.fill();
            if(s.radius>1.8&&alpha>0.6){ ctx.beginPath(); ctx.arc(dx,dy,s.radius*1.5,0,Math.PI*2); ctx.fillStyle=`rgba(255,220,170,${alpha*0.2})`; ctx.fill(); } 
        }
        for(let i=0;i<meteors.length;i++){ if(meteors[i].update()) meteors[i].draw(ctx,nowSec); else meteors.splice(i--,1); }
        tryAddMeteor(nowSec); 
    }
    function resizeCanvas(){ width=window.innerWidth; height=window.innerHeight; canvas.width=width; canvas.height=height; }
    function animate(t){ drawStars(t); requestAnimationFrame(animate); }
    resizeCanvas(); generateStars(); window.addEventListener('resize',()=>{ resizeCanvas(); targetOffsetX=0; targetOffsetY=0; currentOffsetX=0; currentOffsetY=0; }); lastMeteor=performance.now()/1000-Math.random()*30; requestAnimationFrame(animate);

    function escapeHtml(str){
        if(!str) return '';
        return str.replace(/[&<>"']/g,m=>{
            if(m==='&')return'&amp;';if(m==='<')return'&lt;';if(m==='>')return'&gt;';if(m==='"')return'&quot;';return'&#39;';
        });
    }

    const githubConfig={
        owner: GITHUB_OWNER,
        repo: GITHUB_REPO,
        token: GITHUB_TOKEN
    };
    const SYNC_CONFIG={
        commentsFile:'data/comments.json',
        postsFile:'data/posts.json',
        filesFile:'data/files.json'
    };

    async function fetchFromGitHub(filePath){
        if(!githubConfig.token) return [];
        try{
            const apiUrl = `https://cors-anywhere.herokuapp.com/https://api.github.com/repos/${githubConfig.owner}/${githubConfig.repo}/contents/${filePath}`;
            const res=await fetch(apiUrl,{
                headers:{
                    'Authorization': `token ${githubConfig.token}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                }
            });
            if(res.ok){
                let d=await res.json(); 
                let content = atob(d.content.replace(/\s/g, ''));
                return JSON.parse(content);
            }
            return [];
        }catch(e){
            console.error("拉取失败：",e);
            return [];
        }
    }

    async function saveToGitHub(filePath,data){
        if(!githubConfig.token) return false;
        try{
            let sha=null;
            const chkUrl = `https://cors-anywhere.herokuapp.com/https://api.github.com/repos/${githubConfig.owner}/${githubConfig.repo}/contents/${filePath}`;
            const chk=await fetch(chkUrl,{
                headers:{
                    'Authorization': `token ${githubConfig.token}`,
                    'Accept': 'application/vnd.github.v3+json'
                }
            });
            if(chk.ok){
                let d=await chk.json();
                sha=d.sha;
            }
            const content=JSON.stringify(data,null,2);
            const b64 = btoa(unescape(encodeURIComponent(content)));
            
            const uploadUrl = `https://cors-anywhere.herokuapp.com/https://api.github.com/repos/${githubConfig.owner}/${githubConfig.repo}/contents/${filePath}`;
            const res=await fetch(uploadUrl,{
                method:'PUT',
                headers:{
                    'Authorization': `token ${githubConfig.token}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body:JSON.stringify({
                    message:`同步数据 ${new Date().toLocaleString()}`,
                    content:b64,
                    branch:'main',
                    sha:sha
                })
            });
            return res.ok;
        }catch(e){
            console.error("推送失败：",e);
            return false;
        }
    }

    let comments = [];
    let posts = [];

    function renderComments(){
        const wrap=document.getElementById('commentList');
        if(!wrap)return;
        if(comments.length===0){wrap.innerHTML='<div style="text-align:center;color:#7f86b0;padding:1rem;">✨ 暂无留言，做第一个星际旅人吧 ✨</div>';return;}
        wrap.innerHTML=comments.map((c,i)=>`<div class="comment-item"><div><span class="comment-name">${escapeHtml(c.name)}</span><span class="comment-time">${c.time}</span><button class="delete-comment" data-idx="${i}">✖</button></div><div class="comment-text">${escapeHtml(c.text)}</div></div>`).join('');
        document.querySelectorAll('.delete-comment').forEach(btn=>{
            btn.addEventListener('click',async()=>{
                let i=parseInt(btn.dataset.idx);
                comments.splice(i,1);
                localStorage.setItem('starComments',JSON.stringify(comments));
                await saveToGitHub(SYNC_CONFIG.commentsFile,comments);
                renderComments();
            });
        });
    }

    document.getElementById('submitComment')?.addEventListener('click',async()=>{
        let n=document.getElementById('commentName').value.trim()||'星际旅人';
        let t=document.getElementById('commentText').value.trim();
        if(!t)return;
        n=escapeHtml(n.slice(0,50));t=escapeHtml(t.slice(0,500));
        let time=new Date().toLocaleString();
        comments.unshift({name:n,text:t,time});
        localStorage.setItem('starComments',JSON.stringify(comments));
        const success = await saveToGitHub(SYNC_CONFIG.commentsFile,comments);
        if(success){
            renderComments();
            document.getElementById('commentName').value='';
            document.getElementById('commentText').value='';
            let tip=document.createElement('div');
            tip.innerText='✦ 留言已同步到云端 ✦';
            tip.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(108,92,231,0.75);color:#fff;padding:8px 20px;border-radius:60px;font-size:0.75rem;z-index:2000;';
            document.body.appendChild(tip);
            setTimeout(()=>tip.remove(),2000);
        }else{
            alert('同步失败，请检查 Token 是否正确！');
        }
    });

    function renderPosts(){
        const wrap=document.querySelector('.post-list');if(!wrap)return;
        wrap.innerHTML=posts.map(p=>`
        <article class="post-item">
            <div class="post-meta">
                <span>${p.date}</span><span>◈ ${p.readTime} min read</span>
                <button class="delete-comment" style="float:right;margin-left:1rem;" data-postid="${p.id}">✖</button>
                <button class="read-link" style="float:right;background:none;border:none;padding:0;" data-editid="${p.id}">编辑</button>
            </div>
            <h3 class="post-title"><a href="#">${escapeHtml(p.title)}</a></h3>
            <p class="post-excerpt">${escapeHtml(p.excerpt)}</p>
            <a href="#" class="read-link">探索 →</a>
        </article>`).join('');
        document.querySelectorAll('[data-postid]').forEach(btn=>{
            btn.addEventListener('click',async(e)=>{
                e.preventDefault();let id=parseInt(btn.dataset.postid);
                posts=posts.filter(x=>x.id!==id);
                localStorage.setItem('starPosts',JSON.stringify(posts));
                const success = await saveToGitHub(SYNC_CONFIG.postsFile,posts);
                if(success){
                    renderPosts();
                }else{
                    alert('删除文章同步失败，请检查 Token！');
                }
            });
        });
        document.querySelectorAll('[data-editid]').forEach(btn=>{
            btn.addEventListener('click',e=>{
                e.preventDefault();let id=parseInt(btn.dataset.editid);
                let obj=posts.find(x=>x.id===id);
                if(!obj)return;
                document.getElementById('postTitle').value=obj.title;
                document.getElementById('postExcerpt').value=obj.excerpt;
                document.getElementById('postEditorModal').style.display='flex';
                document.getElementById('postEditorModal').dataset.editing=id;
            });
        });
    }

    const publishBtn=document.getElementById('publishPostBtn');
    const editModal=document.getElementById('postEditorModal');
    const closeEdit=document.getElementById('closeEditorBtn');
    const cancelEdit=document.getElementById('cancelPostBtn');
    const saveEdit=document.getElementById('savePostBtn');
    publishBtn?.addEventListener('click',()=>{
        document.getElementById('postTitle').value='';
        document.getElementById('postExcerpt').value='';
        delete editModal.dataset.editing;
        editModal.style.display='flex';
    });
    closeEdit?.addEventListener('click',()=>editModal.style.display='none');
    cancelEdit?.addEventListener('click',()=>editModal.style.display='none');
    saveEdit?.addEventListener('click',async()=>{
        let title=document.getElementById('postTitle').value.trim();
        let excerpt=document.getElementById('postExcerpt').value.trim();
        if(!title||!excerpt){alert('请填写标题和内容');return;}
        let now=new Date();
        let d=`${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}.${now.getFullYear()}`;
        let rt=Math.max(1,Math.ceil(excerpt.length/200));
        let eid=editModal.dataset.editing;
        if(eid){
            let id=parseInt(eid);
            let idx=posts.findIndex(x=>x.id===id);
            if(idx>-1) posts[idx]={...posts[idx],title,date:d,readTime:rt,excerpt};
        }else{
            posts.unshift({id:Date.now(),title,date:d,readTime:rt,excerpt});
        }
        localStorage.setItem('starPosts',JSON.stringify(posts));
        const success = await saveToGitHub(SYNC_CONFIG.postsFile,posts);
        if(success){
            renderPosts();
            editModal.style.display='none';
            let t=document.createElement('div');
            t.innerText='✦ 文章已云端同步 ✦';
            t.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(108,92,231,0.75);backdrop-filter:blur(12px);color:#fff;padding:8px 20px;border-radius:60px;font-size:0.75rem;z-index:2000;';
            document.body.appendChild(t);setTimeout(()=>t.remove(),1800);
        }else{
            alert('文章同步失败，请检查 Token 是否正确！');
        }
    });
    editModal?.addEventListener('click',e=>{if(e.target===editModal)editModal.style.display='none';});

    initFullSync = async function(){
        syncTip.innerText = "🔄 正在拉取云端数据...";
        console.log("强制同步云端数据");

        comments = await fetchFromGitHub(SYNC_CONFIG.commentsFile);
        localStorage.setItem('starComments',JSON.stringify(comments));
        renderComments();

        posts = await fetchFromGitHub(SYNC_CONFIG.postsFile);
        if(posts.length === 0){
            posts = [
                {id:1,title:'AI 协作 · 重构创造力边界',date:'03.18.2025',readTime:6,excerpt:'当模型成为第二大脑，我们如何保持思辨？从提示工程到具身智能，一次关于工具与心流的深度对谈。'},
                {id:2,title:'暗色模式设计：超越美学的体验构建',date:'03.08.2025',readTime:4,excerpt:'从对比度到情感映射，如何让黑色界面既有深度又不失优雅？解构深色UI的微妙心理学。'},
                {id:3,title:'独立开发 2.0：工具链与认知盈余',date:'02.24.2025',readTime:9,excerpt:'从 0 到产品，AI 时代独立开发者如何利用新杠杆？分享我的工作流与年度反思。'},
                {id:4,title:'星辰语法：生成式艺术与代码',date:'02.10.2025',readTime:5,excerpt:'用 shader 与随机噪声创造无尽星空，探索数学之美与数字诗意的交汇点。'}
            ];
        }
        localStorage.setItem('starPosts',JSON.stringify(posts));
        renderPosts();

        syncTip.innerText = "✅ 同步完成！";
        setTimeout(()=>syncTip.remove(),2000);
    };

    window.addEventListener("load", async ()=>{
        await initFullSync();
    });

    const tabs=document.querySelectorAll('.tab-btn');
    const panes={comments:document.getElementById('comments-pane'),upload:document.getElementById('upload-pane'),ai:document.getElementById('ai-pane')};
    tabs.forEach(btn=>{
        btn.addEventListener('click',()=>{
            let k=btn.dataset.tab;
            tabs.forEach(b=>b.classList.remove('active'));btn.classList.add('active');
            Object.values(panes).forEach(p=>p.classList.remove('active-pane'));
            if(panes[k])panes[k].classList.add('active-pane');
        });
    });

    document.querySelectorAll('.decor-nav a').forEach(link=>{
        link.addEventListener('click',e=>{
            e.preventDefault();
            document.querySelectorAll('.decor-nav a').forEach(a=>a.classList.remove('active'));
            link.classList.add('active');
            let txt=link.textContent;
            const wrap=document.querySelector('.post-list');
            if(txt==='星尘笔记')renderPosts();
            else if(txt==='灵感清单')wrap.innerHTML=`<div style="text-align:center;padding:2rem;"><h3 style="font-size:1.2rem;margin-bottom:1rem;color:#cbc3ff;">✨灵感清单</h3><p style="color:#b9c2e6;margin-bottom:2rem;">记录你的创意灵感</p></div>`;
            else if(txt==='深空手记')wrap.innerHTML=`<div style="text-align:center;padding:2rem;"><h3 style="font-size:1.2rem;margin-bottom:1rem;color:#cbc3ff;">🌌深空手记</h3><p style="color:#b9c2e6;margin-bottom:2rem;">探索技术与创意的边界</p></div>`;
        });
    });

    document.querySelectorAll('.read-link,.post-title a').forEach(a=>{
        a.addEventListener('click',e=>{
            if(a.getAttribute('href')==='#'){
                e.preventDefault();
                let t=document.createElement('div');
                t.innerText='✦ 完整星文即将抵达，敬请期待 ✦';
                t.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.75);backdrop-filter:blur(12px);color:#d9d4ff;padding:8px 20px;border-radius:60px;font-size:0.7rem;z-index:2000;';
                document.body.appendChild(t);setTimeout(()=>t.remove(),1800);
            }
        });
    });

    const apiKeyInput=document.getElementById('deepseekApiKey');
    const saveApiKeyBtn=document.getElementById('saveApiKeyBtn');
    const clearChatBtn=document.getElementById('clearChatBtn');
    const chatMessages=document.getElementById('chatMessages');
    const chatInput=document.getElementById('chatInput');
    const sendChatBtn=document.getElementById('sendChatBtn');
    const typingTip=document.getElementById('typingIndicator');
    let chatHis=JSON.parse(localStorage.getItem('aiConversation')||'[]');
    let nowKey=localStorage.getItem('deepseekApiKey')||'';
    if(nowKey)apiKeyInput.value=nowKey;
    function renderChat(){
        if(!chatMessages)return;chatMessages.innerHTML='';
        chatHis.forEach(m=>{
            let d=document.createElement('div');d.className=`message ${m.role}`;
            let c=document.createElement('div');c.className='message-content';c.innerText=m.content;
            d.appendChild(c);chatMessages.appendChild(d);
        });
        if(chatHis.length===0) chatMessages.innerHTML=`<div class="message assistant"><div class="message-content">✨ 我是你的深空AI助手，基于 DeepSeek 模型。输入你的问题，一起探索星辰大海～</div></div>`;
        chatMessages.scrollTop=chatMessages.scrollHeight;
    }
    saveApiKeyBtn?.addEventListener('click',()=>{
        let k=apiKeyInput.value.trim();
        if(k.startsWith('sk-')&&k.length>30){
            localStorage.setItem('deepseekApiKey',k);nowKey=k;
            let t=document.createElement('div');t.innerText='✦ API Key 已保存 ✦';
            t.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(108,92,231,0.75);color:#fff;padding:8px 20px;border-radius:60px;font-size:0.7rem;z-index:2000;';
            document.body.appendChild(t);setTimeout(()=>t.remove(),1800);
        }else alert('请输入合法 DeepSeek sk- 开头密钥');
    });
    clearChatBtn?.addEventListener('click',()=>{chatHis=[];localStorage.setItem('aiConversation',JSON.stringify(chatHis));renderChat();});
    async function callAI(text){
        if(!nowKey)throw new Error('未配置API Key');
        let msgs=[...chatHis,{role:'user',content:text}];
        let res=await fetch('https://api.deepseek.com/v1/chat/completions',{
            method:'POST',
            headers:{'Content-Type':'application/json','Authorization':`Bearer ${nowKey}`},
            body:JSON.stringify({model:'deepseek-chat',messages:msgs,temperature:0.7,max_tokens:800})
        });
        if(!res.ok)throw new Error('请求失败');
        let d=await res.json();
        return d.choices[0].message.content;
    }
    async function sendChat(){
        let txt=chatInput.value.trim();if(!txt)return;
        if(!nowKey){alert('请先填写DeepSeek密钥');return;}
        chatHis.push({role:'user',content:txt});renderChat();chatInput.value='';typingTip.style.display='block';
        try{
            let rep=await callAI(txt);
            chatHis.push({role:'assistant',content:rep});
            if(chatHis.length>20)chatHis=chatHis.slice(-20);
            localStorage.setItem('aiConversation',JSON.stringify(chatHis));renderChat();
        }catch(e){
            chatHis.push({role:'assistant',content:'❌ 请求异常：'+e.message});renderChat();
        }finally{typingTip.style.display='none';}
    }
    sendChatBtn?.addEventListener('click',sendChat);
    chatInput?.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}});
    renderChat();
})();
</script>
</body>
